<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexcent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background: #F5F7FA; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
        }
        
        .login-card { 
            background: #fff; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        
        h2 { margin-bottom: 10px; color: #263238; }
        h2 span { color: #4CAF50; }
        p { color: #717171; margin-bottom: 25px; font-size: 14px; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #4D4D4D; font-size: 14px; font-weight: 500; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #D9D9D9; 
            border-radius: 6px; 
            outline: none; 
            transition: 0.3s; 
        }
        input:focus { border-color: #4CAF50; box-shadow: 0 0 5px rgba(76, 175, 80, 0.2); }
        
        .options { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            font-size: 13px; 
        }
        .options a { color: #4CAF50; text-decoration: none; font-weight: 500; }
        
        .btn-login { 
            background: #4CAF50; 
            color: white; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-login:hover { background: #388E3C; transform: translateY(-2px); }
        
        .signup-text { margin-top: 25px; font-size: 14px; color: #717171; }
        .signup-text a { color: #4CAF50; font-weight: 600; text-decoration: none; }
        
        .back-home { 
            margin-top: 20px; 
            display: inline-block; 
            font-size: 13px; 
            color: #999; 
            text-decoration: none; 
            transition: 0.3s; 
        }
        .back-home:hover { color: #4CAF50; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Nex<span>cent</span></h2>
        <p>লগইন করে আপনার অ্যাকাউন্টে প্রবেশ করুন</p>
        
        <form>
            <div class="input-group">
                <label>ইউজারনেম বা ইমেইল</label>
                <input type="text" placeholder="Username or Email" required>
            </div>
            
            <div class="input-group">
                <label>পাসওয়ার্ড</label>
                <input type="password" placeholder="Password" required>
            </div>
            
            <div class="options">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #717171;">
                    <input type="checkbox"> মনে রাখুন
                </label>
                <a href="#">পাসওয়ার্ড ভুলে গেছেন?</a>
            </div>
            
            <button type="submit" class="btn-login">লগইন করুন</button>
        </form>
        
        <div class="signup-text">
            অ্যাকাউন্ট নেই? <a href="#">সাইন আপ করুন</a>
        </div>
        
        <a href="index.html" class="back-home">← মূল পেজে ফিরে যান</a>
    </div>

</body>
</html>
